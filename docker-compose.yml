services:
  web:
    image: germandockeruser/phpwebshop-web:latest
    ports:
      - "8080:80"
    depends_on:
      - db

  db:
    image: germandockeruser/webshop-db:latest
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: webshop
      MYSQL_USER: webshop
      MYSQL_PASSWORD: webshop
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data: